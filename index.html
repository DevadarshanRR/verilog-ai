<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>logX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f172a, #020617);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 700px;
        }

        h1 {
            font-size: 64px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        p {
            font-size: 20px;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 40px;
        }

        .launch-btn {
            display: inline-block;
            padding: 16px 40px;
            font-size: 18px;
            background: #16a34a;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: 0.3s ease;
        }

        .launch-btn:hover {
            background: #15803d;
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 60px;
            font-size: 14px;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>logX</h1>

    <p>
        AI-powered RTL design assistant that converts natural language hardware
        specifications into fully synthesizable Verilog code.
        Built for VLSI engineers, students, and digital system designers.
    </p>

    <a href="https://verilog-ai-58wu4govxzgodcvwrjl5ht.streamlit.app/"
       target="_blank"
       rel="noopener noreferrer"
       class="launch-btn">
        Launch Application →
    </a>

    <div class="footer">
        Built using Streamlit, Groq LLM, and Advanced Prompt Engineering.
    </div>
</div>

</body>
</html>
